<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>近所のお気に入りマップ</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Fonts: Zen Maru Gothic (wordmark) / Zen Kaku Gothic New (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bay:#1b2a41;        /* deep bay water */
  --bay-deep:#0f1c2e;
  --sand:#f6f1e7;       /* warm paper */
  --coral:#e07a5f;      /* sunset */
  --coral-soft:#e8a14b; /* amber */
  --teal:#5b9aa0;       /* shallow water */
  --rose:#d96c8f;       /* date */
  --slate:#7b86a3;
  --ink:#243447;
  --muted:#6b7a8d;
  --line:rgba(27,42,65,.12);
  --shadow:0 10px 30px rgba(15,28,46,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  color:var(--ink); background:var(--sand);
  overflow:hidden;
}

/* ── map ── */
#map{position:absolute; inset:0; z-index:1; background:#dfe6ea;}
.leaflet-container{font-family:inherit;}

/* ── header ── */
.topbar{
  position:absolute; top:0; left:0; right:0; z-index:600;
  padding:10px 14px 12px;
  background:linear-gradient(135deg, var(--bay-deep) 0%, var(--bay) 48%, #6a4a52 88%, var(--coral) 130%);
  color:#fff; box-shadow:0 4px 18px rgba(15,28,46,.28);
}
.brand{display:flex; align-items:center; gap:9px;}
.brand .compass{
  width:26px;height:26px;flex:none;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.55);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  background:rgba(255,255,255,.08);
}
.brand h1{
  font-family:'Zen Maru Gothic',sans-serif; font-weight:700;
  font-size:1.05rem; letter-spacing:.04em; line-height:1.1;
}
.brand .sub{ display:block; font-size:.6rem; letter-spacing:.22em;
  color:rgba(255,255,255,.62); font-weight:500; margin-top:1px;}
.menu-btn{
  margin-left:auto; background:rgba(255,255,255,.12); border:none; color:#fff;
  width:34px;height:34px;border-radius:10px;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.menu-btn:active{background:rgba(255,255,255,.24);}

/* category filter chips */
.cat-row{
  display:flex; gap:7px; margin-top:11px; overflow-x:auto; padding-bottom:2px;
  scrollbar-width:none;
}
.cat-row::-webkit-scrollbar{display:none;}
.chip{
  flex:none; border:none; cursor:pointer;
  font-family:inherit; font-size:.74rem; font-weight:500;
  padding:6px 12px; border-radius:20px; color:#fff;
  background:rgba(255,255,255,.14); display:flex; align-items:center; gap:5px;
  transition:opacity .15s, transform .1s;
}
.chip .dot{width:8px;height:8px;border-radius:50%;}
.chip.off{opacity:.4;}
.chip:active{transform:scale(.95);}

/* ── floating actions ── */
.fab-add{
  position:absolute; right:16px; bottom:24px; z-index:600;
  background:var(--coral); color:#fff; border:none; cursor:pointer;
  height:54px; padding:0 20px 0 18px; border-radius:28px;
  font-family:inherit; font-weight:700; font-size:.95rem; letter-spacing:.02em;
  display:flex; align-items:center; gap:8px; box-shadow:var(--shadow);
  transition:transform .12s, background .15s;
}
.fab-add:active{transform:scale(.96);}
.fab-add.arming{background:var(--rose);}
.fab-add .plus{font-size:1.3rem; line-height:1; margin-top:-2px;}

.fab-list{
  position:absolute; left:16px; bottom:24px; z-index:600;
  background:#fff; color:var(--ink); border:1px solid var(--line); cursor:pointer;
  height:46px; padding:0 16px; border-radius:23px;
  font-family:inherit; font-weight:700; font-size:.82rem;
  display:flex; align-items:center; gap:7px; box-shadow:var(--shadow);
}
.fab-list:active{transform:scale(.96);}

/* arm hint */
.arm-hint{
  position:absolute; top:118px; left:50%; transform:translateX(-50%);
  z-index:600; background:var(--bay); color:#fff;
  padding:9px 16px; border-radius:22px; font-size:.78rem; font-weight:500;
  box-shadow:var(--shadow); display:none; white-space:nowrap;
  animation:dropIn .25s ease;
}
.arm-hint.show{display:block;}
@keyframes dropIn{from{opacity:0;transform:translate(-50%,-8px);}to{opacity:1;transform:translate(-50%,0);}}

/* ── marker pin ── */
.pin{
  width:30px;height:30px;border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2.5px solid #fff; box-shadow:0 3px 8px rgba(15,28,46,.4);
  display:flex;align-items:center;justify-content:center;
}
.pin span{transform:rotate(45deg); font-size:14px; line-height:1;}

/* ── popup ── */
.leaflet-popup-content-wrapper{border-radius:16px; box-shadow:var(--shadow); padding:2px;}
.leaflet-popup-content{margin:13px 15px; min-width:182px; font-family:inherit;}
.pp-cat{
  display:inline-flex; align-items:center; gap:5px;
  font-size:.66rem; font-weight:700; color:#fff;
  padding:3px 9px; border-radius:12px; margin-bottom:7px; letter-spacing:.03em;
}
.pp-name{font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:1.02rem; color:var(--ink); line-height:1.3;}
.pp-comment{font-size:.78rem; color:var(--muted); margin-top:6px; line-height:1.55;}
.pp-tags{display:flex; flex-wrap:wrap; gap:4px; margin-top:9px;}
.pp-tag{font-size:.64rem; color:var(--teal); background:rgba(91,154,160,.12); padding:2px 8px; border-radius:10px; font-weight:500;}
.pp-actions{display:flex; gap:8px; margin-top:11px;}
.pp-actions button{
  flex:1; border:none; cursor:pointer; font-family:inherit; font-weight:700;
  font-size:.74rem; padding:7px 0; border-radius:9px;
}
.pp-edit{background:var(--bay); color:#fff;}
.pp-del{background:#f3e4e4; color:#b34646;}

/* ── bottom sheet (form) ── */
.scrim{
  position:fixed; inset:0; z-index:900; background:rgba(15,28,46,.42);
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.scrim.show{opacity:1; pointer-events:auto;}

.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:950;
  background:var(--sand); border-radius:22px 22px 0 0;
  padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(15,28,46,.25);
  transform:translateY(105%); transition:transform .3s cubic-bezier(.22,.61,.36,1);
  max-height:86vh; overflow-y:auto;
}
.sheet.show{transform:translateY(0);}
.sheet .grip{width:40px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 14px;}
.sheet h2{font-family:'Zen Maru Gothic',sans-serif; font-size:1.05rem; margin-bottom:14px; color:var(--ink);}

.field{margin-bottom:15px;}
.field > label{display:block; font-size:.74rem; font-weight:700; color:var(--ink); margin-bottom:7px; letter-spacing:.02em;}
.field input[type=text], .field textarea{
  width:100%; font-family:inherit; font-size:.92rem; color:var(--ink);
  border:1.5px solid var(--line); border-radius:11px; padding:11px 13px; background:#fff;
}
.field input[type=text]:focus, .field textarea:focus{outline:2px solid var(--coral); outline-offset:0; border-color:transparent;}
.field textarea{resize:none; min-height:64px; line-height:1.5;}

.pick{display:flex; flex-wrap:wrap; gap:7px;}
.pick button{
  font-family:inherit; font-size:.78rem; font-weight:500; cursor:pointer;
  border:1.5px solid var(--line); background:#fff; color:var(--ink);
  padding:7px 13px; border-radius:18px; display:flex; align-items:center; gap:6px;
  transition:transform .1s;
}
.pick button .dot{width:8px;height:8px;border-radius:50%;}
.pick button:active{transform:scale(.95);}
.pick button.sel{color:#fff; border-color:transparent;}
.pick button.tagsel{background:var(--teal); color:#fff; border-color:transparent;}

.tag-add{display:flex; gap:7px; margin-top:8px;}
.tag-add input{flex:1;}
.tag-add button{
  flex:none; background:var(--bay); color:#fff; border:none; border-radius:11px;
  padding:0 16px; font-family:inherit; font-weight:700; font-size:.8rem; cursor:pointer;
}

.sheet-actions{display:flex; gap:10px; margin-top:6px;}
.sheet-actions button{
  flex:1; font-family:inherit; font-weight:700; font-size:.92rem; cursor:pointer;
  padding:13px 0; border-radius:13px; border:none;
}
.btn-save{background:var(--coral); color:#fff;}
.btn-save:disabled{opacity:.45;}
.btn-cancel{background:transparent; color:var(--muted); border:1.5px solid var(--line);}

/* list panel */
.list-item{
  display:flex; gap:12px; align-items:flex-start; padding:13px 4px;
  border-bottom:1px solid var(--line); cursor:pointer;
}
.list-item:last-child{border-bottom:none;}
.list-pin{width:30px;height:30px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.list-body h3{font-family:'Zen Maru Gothic',sans-serif;font-size:.92rem;color:var(--ink);}
.list-body p{font-size:.72rem;color:var(--muted);margin-top:3px;line-height:1.45;}
.list-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:30px 10px;line-height:1.7;}

/* menu */
.menu-item{
  display:flex; align-items:center; gap:12px; width:100%;
  font-family:inherit; font-size:.92rem; color:var(--ink); font-weight:500;
  background:#fff; border:1px solid var(--line); border-radius:13px;
  padding:14px 16px; margin-bottom:9px; cursor:pointer; text-align:left;
}
.menu-item .ic{font-size:1.15rem;}
.menu-item.warn{color:#b34646;}

.note{font-size:.7rem; color:var(--muted); line-height:1.6; margin-top:6px;}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important; animation:none !important;}
}
</style>
</head>
<body>

<div id="map"></div>

<header class="topbar">
  <div class="brand">
    <div class="compass">✦</div>
    <div>
      <h1>近所のお気に入り</h1>
      <span class="sub">KAIGAN &nbsp;FAVORITES</span>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="メニュー">⋯</button>
  </div>
  <div class="cat-row" id="catRow"></div>
</header>

<div class="arm-hint" id="armHint">地図をタップして場所を決めてね</div>

<button class="fab-list" id="listBtn">☰ リスト</button>
<button class="fab-add" id="addBtn"><span class="plus">＋</span> スポット追加</button>

<!-- scrim + sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<script>
/* ───────────── データ定義 ───────────── */
const CATS = {
  cafe:   { label:'カフェ',   icon:'☕', color:'#5b9aa0' },
  brunch: { label:'ブランチ', icon:'🥐', color:'#e8a14b' },
  meshi:  { label:'ごはん',   icon:'🍽️', color:'#c2683f' },
  date:   { label:'デート',   icon:'💛', color:'#d96c8f' },
  other:  { label:'その他',   icon:'📍', color:'#7b86a3' },
};
const PRESET_TAGS = ['歩いて行ける','海が見える','テラス','ひとりOK','作業できる','夜まで','朝ごはん','安い','デート向け','雨でもOK'];

const SEED = [
  { id:'s1', name:'KAIGAN Cafe', cat:'brunch', lat:35.63956, lng:139.75482,
    tags:['歩いて行ける','ひとりOK','作業できる','安い'],
    comment:'公共施設の中の穴場。静かで安い日替わりランチ、朝ごはんもある。作業にも◎' },
  { id:'s2', name:'ballad the lab', cat:'cafe', lat:35.65512, lng:139.76070,
    tags:['海が見える','テラス'],
    comment:'竹芝ポートシティ6階。テラスから湾の眺めが最高。評価もかなり高い。' },
  { id:'s3', name:'Blue Bottle Coffee 竹芝', cat:'cafe', lat:35.65506, lng:139.76090,
    tags:['ひとりOK','作業できる'],
    comment:'竹芝のブルーボトル。海辺の散歩のついでの一杯にちょうどいい。' },
  { id:'s4', name:'Byron Bay Coffee', cat:'brunch', lat:35.65750, lng:139.75643,
    tags:['朝ごはん','ひとりOK'],
    comment:'浜松町。アサイーボウルとアボカドトーストの朝ごはんが人気。' },
  { id:'s5', name:'BESIDE SEASIDE', cat:'date', lat:35.65166, lng:139.76075,
    tags:['海が見える','テラス','デート向け'],
    comment:'日の出ふ頭そば。海を見ながらのランチコースがデートにぴったり。' },
  { id:'s6', name:'Café La Bohème 浜松町', cat:'meshi', lat:35.65441, lng:139.75646,
    tags:['夜まで','デート向け'],
    comment:'浜松町。スフレパンケーキやイタリアン。夜遅くまで開いてて使いやすい。' },
];

/* ───────────── 保存（localStorage＋メモリfallback）───────────── */
const KEY='kaigan_favs_v1';
let memStore=null;
function load(){
  try{ const r=localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
  if(memStore) return memStore;
  return null;
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(spots)); }
  catch(e){ memStore=spots.slice(); }
}

let spots = load();
if(!spots){ spots = SEED.map(s=>({...s})); save(); }

/* ───────────── 地図 ───────────── */
const map = L.map('map',{zoomControl:true, attributionControl:true})
  .setView([35.6452,139.7572], 15);
L.control.zoom({position:'bottomright'}).addTo(map);   // default removed, re-added bottom-right
map.zoomControl.setPosition && map.zoomControl.setPosition('bottomright');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap'
}).addTo(map);

let markers = {};           // id -> marker
let activeCats = new Set(Object.keys(CATS));

function makeIcon(cat){
  const c = CATS[cat] || CATS.other;
  return L.divIcon({
    className:'', iconSize:[30,42], iconAnchor:[15,40], popupAnchor:[0,-38],
    html:`<div class="pin" style="background:${c.color}"><span>${c.icon}</span></div>`
  });
}

function popupHTML(s){
  const c = CATS[s.cat] || CATS.other;
  const tags = (s.tags||[]).map(t=>`<span class="pp-tag">${esc(t)}</span>`).join('');
  return `
    <span class="pp-cat" style="background:${c.color}">${c.icon} ${c.label}</span>
    <div class="pp-name">${esc(s.name)}</div>
    ${s.comment?`<div class="pp-comment">${esc(s.comment)}</div>`:''}
    ${tags?`<div class="pp-tags">${tags}</div>`:''}
    <div class="pp-actions">
      <button class="pp-edit" onclick="editSpot('${s.id}')">編集</button>
      <button class="pp-del" onclick="delSpot('${s.id}')">削除</button>
    </div>`;
}

function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  const tagFilter = activeTagFilter;
  spots.forEach(s=>{
    if(!activeCats.has(s.cat)) return;
    if(tagFilter && !(s.tags||[]).includes(tagFilter)) return;
    const m = L.marker([s.lat,s.lng],{icon:makeIcon(s.cat)}).addTo(map);
    m.bindPopup(popupHTML(s));
    markers[s.id]=m;
  });
}

/* ───────────── カテゴリ絞り込みチップ ───────────── */
const catRow = document.getElementById('catRow');
function buildCatChips(){
  catRow.innerHTML='';
  Object.entries(CATS).forEach(([k,c])=>{
    const b=document.createElement('button');
    b.className='chip'; b.dataset.cat=k;
    b.innerHTML=`<span class="dot" style="background:${c.color}"></span>${c.label}`;
    b.onclick=()=>{
      if(activeCats.has(k)){ activeCats.delete(k); b.classList.add('off'); }
      else { activeCats.add(k); b.classList.remove('off'); }
      renderMarkers();
    };
    catRow.appendChild(b);
  });
}
buildCatChips();

let activeTagFilter = null;

/* ───────────── 追加モード ───────────── */
const addBtn=document.getElementById('addBtn');
const armHint=document.getElementById('armHint');
let arming=false;
addBtn.onclick=()=>{
  arming=!arming;
  addBtn.classList.toggle('arming',arming);
  armHint.classList.toggle('show',arming);
  addBtn.querySelector('.plus').textContent = arming?'×':'＋';
  addBtn.childNodes[1].textContent = arming?' キャンセル':' スポット追加';
  map.getContainer().style.cursor = arming?'crosshair':'';
};
map.on('click',(e)=>{
  if(!arming) return;
  arming=false; addBtn.classList.remove('arming'); armHint.classList.remove('show');
  addBtn.querySelector('.plus').textContent='＋'; addBtn.childNodes[1].textContent=' スポット追加';
  map.getContainer().style.cursor='';
  openForm(null, e.latlng.lat, e.latlng.lng);
});

/* ───────────── フォーム（追加・編集）───────────── */
const scrim=document.getElementById('scrim');
const sheet=document.getElementById('sheet');
function closeSheet(){ scrim.classList.remove('show'); sheet.classList.remove('show'); }
scrim.onclick=closeSheet;

let formState=null;
function openForm(id, lat, lng){
  const editing = !!id;
  const s = editing ? spots.find(x=>x.id===id) : {name:'',cat:'cafe',tags:[],comment:'',lat,lng};
  formState = { id, lat:s.lat, lng:s.lng, cat:s.cat, tags:[...(s.tags||[])] };

  const catBtns = Object.entries(CATS).map(([k,c])=>
    `<button data-cat="${k}" class="${k===s.cat?'sel':''}" style="${k===s.cat?`background:${c.color}`:''}">
       <span class="dot" style="background:${c.color}"></span>${c.label}</button>`).join('');

  const allTags = Array.from(new Set([...PRESET_TAGS, ...(s.tags||[])]));
  const tagBtns = allTags.map(t=>
    `<button data-tag="${esc(t)}" class="${(s.tags||[]).includes(t)?'tagsel':''}">${esc(t)}</button>`).join('');

  sheet.innerHTML=`
    <div class="grip"></div>
    <h2>${editing?'スポットを編集':'お気に入りを追加'}</h2>
    <div class="field">
      <label for="fName">店名・場所</label>
      <input type="text" id="fName" placeholder="例：海辺のカフェ" value="${esc(s.name)}" autocomplete="off">
    </div>
    <div class="field">
      <label>カテゴリ</label>
      <div class="pick" id="catPick">${catBtns}</div>
    </div>
    <div class="field">
      <label>タグ（複数えらべるよ）</label>
      <div class="pick" id="tagPick">${tagBtns}</div>
      <div class="tag-add">
        <input type="text" id="fTag" placeholder="自分のタグを追加" autocomplete="off">
        <button id="addTagBtn">追加</button>
      </div>
    </div>
    <div class="field">
      <label for="fComment">ひとことメモ</label>
      <textarea id="fComment" placeholder="雰囲気・おすすめメニュー・行った感想など">${esc(s.comment||'')}</textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="cancelBtn">キャンセル</button>
      <button class="btn-save" id="saveBtn">保存する</button>
    </div>`;

  // category pick
  sheet.querySelector('#catPick').onclick=(ev)=>{
    const b=ev.target.closest('button[data-cat]'); if(!b) return;
    formState.cat=b.dataset.cat;
    sheet.querySelectorAll('#catPick button').forEach(x=>{
      const on = x.dataset.cat===formState.cat;
      x.classList.toggle('sel',on);
      x.style.background = on ? CATS[x.dataset.cat].color : '';
    });
  };
  // tag pick
  const tagPick=sheet.querySelector('#tagPick');
  tagPick.onclick=(ev)=>{
    const b=ev.target.closest('button[data-tag]'); if(!b) return;
    const t=b.dataset.tag;
    if(formState.tags.includes(t)){ formState.tags=formState.tags.filter(x=>x!==t); b.classList.remove('tagsel'); }
    else { formState.tags.push(t); b.classList.add('tagsel'); }
  };
  // add custom tag
  sheet.querySelector('#addTagBtn').onclick=()=>{
    const inp=sheet.querySelector('#fTag'); const t=inp.value.trim(); if(!t) return;
    if(!formState.tags.includes(t)) formState.tags.push(t);
    if(!tagPick.querySelector(`[data-tag="${CSS.escape(t)}"]`)){
      const b=document.createElement('button'); b.dataset.tag=t; b.textContent=t; b.className='tagsel';
      tagPick.appendChild(b);
    } else {
      tagPick.querySelector(`[data-tag="${CSS.escape(t)}"]`).classList.add('tagsel');
    }
    inp.value='';
  };
  sheet.querySelector('#cancelBtn').onclick=closeSheet;
  sheet.querySelector('#saveBtn').onclick=()=>{
    const name=sheet.querySelector('#fName').value.trim();
    if(!name){ sheet.querySelector('#fName').focus(); return; }
    const comment=sheet.querySelector('#fComment').value.trim();
    if(formState.id){
      const sp=spots.find(x=>x.id===formState.id);
      Object.assign(sp,{name,cat:formState.cat,tags:formState.tags,comment});
    } else {
      spots.push({ id:'u'+Date.now(), name, cat:formState.cat, tags:formState.tags,
                   comment, lat:formState.lat, lng:formState.lng });
    }
    save(); renderMarkers(); closeSheet();
    const id = formState.id || spots[spots.length-1].id;
    if(markers[id]) markers[id].openPopup();
  };

  scrim.classList.add('show'); sheet.classList.add('show');
  sheet.scrollTop=0;
}

window.editSpot=(id)=>{ map.closePopup(); openForm(id); };
window.delSpot=(id)=>{
  const s=spots.find(x=>x.id===id); if(!s) return;
  if(!confirm(`「${s.name}」を削除しますか？`)) return;
  spots=spots.filter(x=>x.id!==id); save(); renderMarkers(); map.closePopup();
};

/* ───────────── リスト表示 ───────────── */
document.getElementById('listBtn').onclick=()=>{
  const items = spots.length ? spots.map(s=>{
    const c=CATS[s.cat]||CATS.other;
    return `<div class="list-item" data-id="${s.id}">
      <div class="list-pin" style="background:${c.color}22;color:${c.color}">${c.icon}</div>
      <div class="list-body">
        <h3>${esc(s.name)}</h3>
        <p>${esc(s.comment||c.label)}</p>
      </div></div>`;
  }).join('') : `<div class="list-empty">まだスポットがありません。<br>「＋ スポット追加」から登録してね。</div>`;

  sheet.innerHTML=`<div class="grip"></div>
    <h2>お気に入り一覧 <span style="font-size:.7rem;color:var(--muted);font-weight:500;">（${spots.length}件）</span></h2>
    ${items}`;
  sheet.querySelectorAll('.list-item').forEach(el=>{
    el.onclick=()=>{
      const s=spots.find(x=>x.id===el.dataset.id);
      closeSheet(); map.setView([s.lat,s.lng],17,{animate:true});
      setTimeout(()=>markers[s.id] && markers[s.id].openPopup(),350);
    };
  });
  scrim.classList.add('show'); sheet.classList.add('show'); sheet.scrollTop=0;
};

/* ───────────── メニュー（書き出し・読み込み・リセット）───────────── */
document.getElementById('menuBtn').onclick=()=>{
  sheet.innerHTML=`<div class="grip"></div>
    <h2>メニュー</h2>
    <button class="menu-item" id="mExport"><span class="ic">⬇️</span>データを書き出す（バックアップ）</button>
    <button class="menu-item" id="mImport"><span class="ic">⬆️</span>データを読み込む</button>
    <button class="menu-item warn" id="mReset"><span class="ic">↺</span>初期スポットに戻す</button>
    <p class="note">スポットはこの端末のブラウザに保存されます。機種変更や共有のときは「書き出し」でファイルを保存しておくと安心です。</p>`;
  sheet.querySelector('#mExport').onclick=exportData;
  sheet.querySelector('#mImport').onclick=importData;
  sheet.querySelector('#mReset').onclick=()=>{
    if(!confirm('登録したスポットを消して、最初の6件に戻しますか？')) return;
    spots=SEED.map(s=>({...s})); save(); renderMarkers(); closeSheet();
  };
  scrim.classList.add('show'); sheet.classList.add('show'); sheet.scrollTop=0;
};

function exportData(){
  const blob=new Blob([JSON.stringify(spots,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kaigan-favorites.json'; a.click();
  URL.revokeObjectURL(a.href);
}
function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(!Array.isArray(data)) throw 0;
        spots=data; save(); renderMarkers(); closeSheet();
      }catch(e){ alert('読み込めませんでした。書き出したファイルを選んでね。'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ───────────── util ───────────── */
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

renderMarkers();
</script>
</body>
</html>
